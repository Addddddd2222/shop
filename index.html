<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legit Drop — Каталог</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background: #0a0a0a;
            color: #ffffff;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 15px;
        }
        .header h1 {
            font-size: 26px;
            background: linear-gradient(135deg, #27e9ff, #00b8d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .header h1 img {
            height: 34px;
            width: auto;
        }
        
        /* Кнопки категорий с эффектом стекла */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 24px;
        }
        .tab-btn {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #aaa;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s ease;
        }
        .tab-btn:hover {
            border-color: #27e9ff;
            color: #fff;
            transform: scale(1.05);
        }
        .tab-btn.active {
            background: rgba(39, 233, 255, 0.15);
            border-color: #27e9ff;
            color: #fff;
        }

        /* Карточки товаров — жидкое стекло */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 16px;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 16px;
            transition: 0.25s ease;
            display: none;
        }
        .card.show {
            display: block;
        }
        .card:hover {
            border-color: #27e9ff;
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(0, 229, 255, 0.1);
        }
        .card img {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.02);
        }
        .card .brand {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
        }
        .card .name {
            font-size: 15px;
            font-weight: 600;
            margin: 4px 0;
        }
        .card .price {
            font-size: 16px;
            font-weight: 700;
            color: #27e9ff;
            margin-bottom: 6px;
        }
        .card .sizes {
            font-size: 12px;
            color: #666;
        }
        .card .id {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
            color: #aaa;
            text-align: center;
        }
        .card .id span {
            color: #27e9ff;
            font-weight: 700;
        }
        .card .contact {
            margin-top: 6px;
            text-align: center;
            font-size: 14px;
            color: #aaa;
        }
        .card .contact a {
            color: #27e9ff;
            text-decoration: none;
            font-weight: 600;
        }
        .empty {
            color: #555;
            text-align: center;
            padding: 40px;
        }
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>
        <img src="logo.png" onerror="this.style.display='none'" alt="Logo">
        Legit Drop
    </h1>
    <div style="font-size:14px; color:#888; margin-top:6px;">Оригинальный стритвир с доставкой по РФ</div>
</div>

<!-- Кнопки категорий с жидким стеклом -->
<div class="tabs" id="categoryTabs"></div>

<!-- Сетка товаров -->
<div class="grid" id="productGrid"></div>

<script>
    let products = [];

    async function loadProducts() {
        try {
            const response = await fetch('data/poizon_products_with_rub.json');
            if (!response.ok) throw new Error('Ошибка загрузки JSON');
            products = await response.json();
            renderTabs();
            renderProducts('Все');
        } catch (error) {
            document.getElementById('productGrid').innerHTML = `<div class="empty">⚠️ Не удалось загрузить товары.</div>`;
            console.error(error);
        }
    }

    function renderTabs() {
        const tabsContainer = document.getElementById('categoryTabs');
        const categories = ['Все', ...new Set(products.map(p => p.category).filter(Boolean))];
        
        tabsContainer.innerHTML = categories.map(cat => `
            <button class="tab-btn ${cat === 'Все' ? 'active' : ''}" data-category="${cat}">
                ${cat}
            </button>
        `).join('');

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                renderProducts(this.dataset.category);
            });
        });
    }

    function renderProducts(category) {
        const grid = document.getElementById('productGrid');
        const filtered = category === 'Все' ? products : products.filter(p => p.category === category);
        
        if (filtered.length === 0) {
            grid.innerHTML = `<div class="empty">В этой категории пока нет товаров</div>`;
            return;
        }
        
        grid.innerHTML = filtered.map(p => `
            <div class="card show">
                <img src="${p.image || ''}" alt="${p.name}" onerror="this.style.display='none'">
                <div class="brand">${p.brand || ''}</div>
                <div class="name">${p.name || ''}</div>
                <div class="price">${p.price_rub ? p.price_rub.toLocaleString() + ' ₽' : ''}</div>
                <div class="sizes">${p.sizes ? '📏 ' + p.sizes.slice(0, 5).join(', ') + (p.sizes.length > 5 ? '...' : '') : ''}</div>
                <div class="id">🆔 ID товара: <span>#${p.id}</span></div>
                <div class="contact">
                    📦 Заказ: <a href="https://t.me/VVVVVV1199" target="_blank">@VVVVVV1199</a>
                </div>
            </div>
        `).join('');
    }

    loadProducts();
</script>
</body>
</html>
