name: Update Products from Poizon

on:
  schedule:
    - cron: '0 3 1,15 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Create data folder and products
        run: |
          mkdir -p data
          echo '[
            {
              "name": "Nike Air Force 1",
              "brand": "Nike",
              "price_rub": 11990,
              "price_yuan": 899,
              "image": ""
            },
            {
              "name": "Adidas Campus",
              "brand": "Adidas",
              "price_rub": 10990,
              "price_yuan": 799,
              "image": ""
            },
            {
              "name": "New Balance 2002R",
              "brand": "New Balance",
              "price_rub": 14990,
              "price_yuan": 1099,
              "image": ""
            },
            {
              "name": "Jordan 1 Retro",
              "brand": "Jordan",
              "price_rub": 17990,
              "price_yuan": 1299,
              "image": ""
            }
          ]' > data/poizon_products_with_rub.json
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/poizon_products_with_rub.json
          git commit -m "🔄 Автообновление товаров" || echo "No changes to commit"
          git push || echo "No changes to push"
