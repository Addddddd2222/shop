name: Update Products from Poizon

on:
  schedule:
    - cron: '0 3 1,15 * *'  # 1-го и 15-го числа в 3:00
  workflow_dispatch:        # Можно запустить вручную

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install requests
      
      - name: Run parser
        run: |
          python -c "
          import requests
          import json
          from datetime import datetime
          
          # Получаем курс
          cbr = requests.get('https://www.cbr-xml-daily.ru/daily_json.js')
          rate = cbr.json()['Valute']['CNY']['Value']
          
          # Тестовые товары (замените на реальный парсинг)
          products = [
              {'name': 'Nike Air Force 1', 'brand': 'Nike', 'price_yuan': 899, 'image': ''},
              {'name': 'Adidas Campus', 'brand': 'Adidas', 'price_yuan': 799, 'image': ''},
              {'name': 'New Balance 2002R', 'brand': 'New Balance', 'price_yuan': 1099, 'image': ''},
          ]
          
          markup = 1.3
          for p in products:
              p['price_rub'] = round(p['price_yuan'] * rate * markup, 2)
          
          with open('data/poizon_products_with_rub.json', 'w') as f:
              json.dump(products, f, ensure_ascii=False, indent=2)
          "
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/poizon_products_with_rub.json
          git diff --staged --quiet || git commit -m "🔄 Обновление товаров $(date +'%Y-%m-%d')"
          git push
